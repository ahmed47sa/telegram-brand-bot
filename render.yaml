services:
  - type: worker
    name: telegram-brand-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: CLAUDE_API_KEY
        sync: false
      - key: OWNER_CHAT_ID
        sync: false
